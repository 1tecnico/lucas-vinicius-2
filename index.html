<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mochila Interativa</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1a1a1a,#333);
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:20px;
}

input{
padding:10px;
border:none;
border-radius:6px;
width:200px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#00c853;
color:white;
cursor:pointer;
margin-left:5px;
transition:0.3s;
}

button:hover{
background:#00e676;
}

.inventory{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fill,120px);
gap:15px;
justify-content:center;
}

.item{
background:#2c2c2c;
padding:15px;
border-radius:10px;
position:relative;
transition:0.3s;
cursor:pointer;
}

.item:hover{
transform:scale(1.1);
background:#3a3a3a;
}

.remove{
position:absolute;
top:5px;
right:8px;
cursor:pointer;
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🎒 Minha Mochila</h1>

<input type="text" id="itemInput" placeholder="Digite um item">
<button onclick="addItem()">Adicionar</button>

<div id="inventory" class="inventory"></div>

<script>

let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

function save(){
localStorage.setItem("inventory", JSON.stringify(inventory));
}

function render(){

const inv = document.getElementById("inventory");
inv.innerHTML="";

inventory.forEach((item,index)=>{

const div=document.createElement("div");
div.className="item";

div.innerHTML=`
<span class="remove" onclick="removeItem(${index})">x</span>
🎒<br>${item}
`;

inv.appendChild(div);

});

}

function addItem(){

const input=document.getElementById("itemInput");
const value=input.value.trim();

if(value==="") return;

inventory.push(value);
input.value="";

save();
render();

}

function removeItem(i){

inventory.splice(i,1);
save();
render();

}

render();

</script>

</body>
</html>
