<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎒 Mochila de Matérias</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.card {
    background: #ffffff;
    width: 100%;
    max-width: 450px;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 600;
    color: #333;
}

.input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    outline: none;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    background: #764ba2;
    color: white;
    font-weight: 500;
    cursor: pointer;
}

button:hover {
    background: #5a3780;
}

ul {
    list-style: none;
    max-height: 300px;
    overflow-y: auto;
}

li {
    background: #f5f6fa;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.remove-btn {
    background: #ff4d4d;
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 8px;
    border: none;
    color: white;
    cursor: pointer;
}

.remove-btn:hover {
    background: #cc0000;
}

.footer {
    margin-top: 15px;
    text-align: center;
    font-size: 13px;
    color: #888;
}
</style>
</head>

<body>

<div class="card">
    <h1>🎒 Minha Mochila</h1>

    <div class="input-group">
        <input type="text" id="materiaInput" placeholder="Digite sua matéria...">
        <button id="addBtn">Adicionar</button>
    </div>

    <ul id="lista"></ul>

    <div class="footer">
        Total de matérias: <span id="total">0</span>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    let materias = JSON.parse(localStorage.getItem("materias")) || [];

    const input = document.getElementById("materiaInput");
    const lista = document.getElementById("lista");
    const total = document.getElementById("total");
    const addBtn = document.getElementById("addBtn");

    function salvar() {
        localStorage.setItem("materias", JSON.stringify(materias));
    }

    function renderizar() {
        lista.innerHTML = "";

        materias.forEach((materia, index) => {
            const li = document.createElement("li");

            const span = document.createElement("span");
            span.textContent = materia;

            const btn = document.createElement("button");
            btn.textContent = "Excluir";
            btn.className = "remove-btn";
            btn.addEventListener("click", function() {
                removerMateria(index);
            });

            li.appendChild(span);
            li.appendChild(btn);
            lista.appendChild(li);
        });

        total.textContent = materias.length;
    }

    function adicionarMateria() {
        const valor = input.value.trim();
        if (valor !== "") {
            materias.push(valor);
            salvar();
            renderizar();
            input.value = "";
        }
    }

    function removerMateria(index) {
        materias.splice(index, 1);
        salvar();
        renderizar();
    }

    addBtn.addEventListener("click", adicionarMateria);

    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            adicionarMateria();
        }
    });

    renderizar();
});
</script>

</body>
</html>
