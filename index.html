<script>
    // 1. Declarar todas as variáveis no topo
    let inventory = JSON.parse(localStorage.getItem("inventory")) || [];
    let notes     = JSON.parse(localStorage.getItem("notes")) || {};
    let currentIndex = null;

    // 2. Funções (podem vir depois das declarações)
    function save() {
        localStorage.setItem("inventory", JSON.stringify(inventory));
        localStorage.setItem("notes", JSON.stringify(notes));
    }

    function render() {
        const inv = document.getElementById("inventory");
        inv.innerHTML = "";

        inventory.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "item";

            const nameDiv = document.createElement("div");
            nameDiv.className = "item-name";
            nameDiv.textContent = item;
            nameDiv.onclick = (e) => {
                e.stopPropagation();
                startEditingName(index, nameDiv);
            };

            div.innerHTML = `
                <span class="remove" onclick="event.stopPropagation(); removeItem(${index})">×</span>
            `;
            div.appendChild(nameDiv);

            if (notes[index] && notes[index].trim()) {
                const noteIcon = document.createElement("span");
                noteIcon.className = "has-note";
                noteIcon.textContent = "📝";
                div.appendChild(noteIcon);
            }

            div.addEventListener("dblclick", () => openNote(index));

            inv.appendChild(div);
        });
    }

    function startEditingName(index, element) {
        if (element.classList.contains("editing")) return;

        const input = document.createElement("input");
        input.type = "text";
        input.value = inventory[index];
        
        element.classList.add("editing");
        element.innerHTML = "";
        element.appendChild(input);
        input.focus();
        input.select();

        const finishEdit = () => {
            const newValue = input.value.trim();
            if (newValue && newValue !== inventory[index]) {
                inventory[index] = newValue;
                save();
            }
            element.classList.remove("editing");
            element.textContent = inventory[index] || "(sem nome)";
        };

        input.onblur = finishEdit;
        input.onkeydown = e => {
            if (e.key === "Enter") {
                e.preventDefault();
                finishEdit();
            }
            if (e.key === "Escape") {
                finishEdit();
            }
        };
    }

    function addItem() {
        const input = document.getElementById("itemInput");
        const value = input.value.trim();
        if (!value) return;
        inventory.push(value);
        input.value = "";
        save();
        render();
    }

    function removeItem(i) {
        if (!confirm(`Remover "${inventory[i]}"?`)) return;
        
        inventory.splice(i, 1);
        
        const newNotes = {};
        Object.keys(notes).forEach(k => {
            const idx = Number(k);
            if (idx < i) newNotes[idx] = notes[k];
            if (idx > i) newNotes[idx - 1] = notes[k];
        });
        notes = newNotes;
        
        save();
        render();
    }

    // ─── Anotações (opcional) ───
    function openNote(index) {
        currentIndex = index;
        document.getElementById("currentItemName").textContent = inventory[index];
        document.getElementById("noteInput").value = notes[index] || "";
        document.getElementById("noteArea").classList.remove("hidden");
        document.getElementById("noteInput").focus();
    }

    function saveNote() {
        if (currentIndex === null) return;
        const val = document.getElementById("noteInput").value.trim();
        if (val) {
            notes[currentIndex] = val;
        } else {
            delete notes[currentIndex];
        }
        save();
        render();
    }

    document.getElementById("noteInput").addEventListener("blur", saveNote);
    document.getElementById("noteInput").addEventListener("keydown", e => {
        if (e.ctrlKey && e.key === "Enter") saveNote();
    });

    // 3. Inicializar a interface
    render();
</script>
