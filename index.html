<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎒 Mochila Dan Da Dan • Estudos</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
      --card: rgba(255, 255, 255, 0.96);
      --text: #2c3e50;
      --accent: #4a69bd;
      --accent2: #6a89cc;
      --success: #00b894;
    }
    .dark {
      --bg: linear-gradient(135deg, #1e2a44 0%, #2c3e50 100%);
      --card: rgba(30, 42, 68, 0.96);
      --text: #e0e7ff;
      --accent: #5e9cff;
      --accent2: #7fb4ff;
      --success: #00d1a8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text);
      transition: background 0.4s;
    }
    .card {
      background: var(--card);
      width: 100%;
      max-width: 520px;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.3);
      transition: all 0.4s;
    }
    .banners-container { margin-bottom: 24px; }
    .banner {
      width: 100%;
      border-radius: 18px;
      margin-bottom: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      transition: transform 0.3s;
    }
    .banner:hover { transform: scale(1.03); }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toggle-dark {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: var(--accent);
      transition: transform 0.3s;
    }
    .toggle-dark:hover { transform: rotate(20deg); }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 16px;
      border: 2px solid #dfe6e9;
      font-size: 1.05rem;
      transition: all 0.3s;
    }
    .dark input { border-color: #4a5f8a; background: #2c3e50; color: white; }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(74, 105, 189, 0.2);
    }
    button {
      padding: 14px 24px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(74,105,189,0.3); }

    .search-group {
      margin-bottom: 20px;
    }
    .search-group input {
      width: 100%;
      background: rgba(255,255,255,0.7);
    }
    .dark .search-group input { background: rgba(44,62,80,0.7); }

    .progress-container {
      margin: 20px 0;
      background: #f1f3f5;
      border-radius: 999px;
      height: 12px;
      overflow: hidden;
    }
    .dark .progress-container { background: #34495e; }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--success), #00d1a8);
      width: 0%;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 999px;
    }

    ul {
      list-style: none;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 8px;
      margin-bottom: 20px;
    }
    ul::-webkit-scrollbar { width: 8px; }
    ul::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 10px;
    }

    li {
      background: #f8f9fa;
      padding: 14px 18px;
      border-radius: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s;
      border: 1px solid #e9ecef;
    }
    .dark li { background: #34495e; border-color: #4a5f8a; }
    li:hover { transform: translateX(8px); box-shadow: 0 6px 15px rgba(0,0,0,0.08); }

    .check {
      width: 26px;
      height: 26px;
      border: 3px solid #bdc3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    li.estudada .check {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }
    .texto {
      flex: 1;
      font-weight: 500;
      font-size: 1.05rem;
      transition: all 0.3s;
    }
    li.estudada .texto {
      text-decoration: line-through;
      opacity: 0.7;
      color: var(--success);
    }

    .actions {
      display: flex;
      gap: 6px;
    }
    .actions button {
      padding: 6px 10px;
      font-size: 1rem;
      min-width: 34px;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 1.05rem;
      font-weight: 600;
      margin: 20px 0 12px;
    }

    .extra-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .extra-btns button {
      flex: 1;
      font-size: 0.95rem;
      padding: 12px;
    }

    .motivacao {
      text-align: center;
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--success);
      opacity: 0;
      transition: opacity 0.6s;
    }
    .motivacao.show { opacity: 1; }

    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.9rem;
      color: #7f8c8d;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="card">
  <!-- Banners Dan Da Dan -->
  <div class="banners-container">
    <img src="https://4kwallpapers.com/images/wallpapers/momo-dandadan-3840x2160-19451.jpg" 
         alt="Dan Da Dan - Momo e Okarun" class="banner">
    <img src="https://www.anitrendz.com/_next/image?url=https%3A%2F%2Fi0.wp.com%2Fanitrendz.net%2Fnews%2Fwp-content%2Fuploads%2F2024%2F10%2FDAN-DA-DAN-Official-Key-Art-2-%25E2%2580%2593-16x9-1.png%3Ffit%3D3840%252C2160%26ssl%3D1&w=1920&q=75" 
         alt="Dan Da Dan - Key Visual" class="banner">
  </div>

  <div class="header">
    <h1><i class="fas fa-book-open"></i> Mochila Dan Da Dan</h1>
    <button id="darkToggle" class="toggle-dark" title="Alternar tema"><i class="fas fa-moon"></i></button>
  </div>

  <!-- Adicionar -->
  <div class="input-group">
    <input type="text" id="materiaInput" placeholder="Nova matéria (ex: Física)" autocomplete="off">
    <button id="addBtn">Adicionar</button>
  </div>

  <!-- Busca -->
  <div class="search-group">
    <input type="text" id="searchInput" placeholder="🔎 Buscar matéria...">
  </div>

  <!-- Progresso -->
  <div class="stats">
    <span>Total: <strong id="total">0</strong></span>
    <span>Estudadas: <strong id="estudadas">0</strong></span>
  </div>
  <div class="progress-container">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <!-- Lista -->
  <ul id="lista"></ul>

  <!-- Botões extras -->
  <div class="extra-btns">
    <button id="randomBtn"><i class="fas fa-dice"></i> Matéria do Dia</button>
    <button id="clearBtn" style="background:#e74c3c;"><i class="fas fa-trash"></i> Limpar Tudo</button>
  </div>

  <!-- Motivação -->
  <div id="motivacao" class="motivacao">🎉 PARABÉNS! Você zerou a mochila! Continue assim, Okarun! 🔥</div>

  <div class="footer">
    Feito com ❤️ para estudos • <a href="https://github.com/SEU-USUARIO/mochila-dandadan" target="_blank">Hospede no GitHub Pages</a>
  </div>
</div>

<script>
// ==================== DADOS E LOCALSTORAGE ====================
let materias = JSON.parse(localStorage.getItem("mochilaDanDaDan")) || [];

// ==================== ELEMENTOS ====================
const input = document.getElementById("materiaInput");
const lista = document.getElementById("lista");
const totalEl = document.getElementById("total");
const estudadasEl = document.getElementById("estudadas");
const progressBar = document.getElementById("progressBar");
const searchInput = document.getElementById("searchInput");
const addBtn = document.getElementById("addBtn");
const randomBtn = document.getElementById("randomBtn");
const clearBtn = document.getElementById("clearBtn");
const darkToggle = document.getElementById("darkToggle");
const motivacao = document.getElementById("motivacao");

// ==================== SALVAR ====================
function salvar() {
  localStorage.setItem("mochilaDanDaDan", JSON.stringify(materias));
}

// ==================== RENDERIZAR ====================
function renderizar(filtro = "") {
  lista.innerHTML = "";

  const filtradas = materias.filter(m => 
    m.nome.toLowerCase().includes(filtro.toLowerCase())
  );

  filtradas.forEach((materia, idxGlobal) => {
    const li = document.createElement("li");
    if (materia.estudada) li.classList.add("estudada");

    // Checkbox
    const check = document.createElement("div");
    check.className = "check";
    check.innerHTML = materia.estudada ? '<i class="fas fa-check"></i>' : '';
    check.addEventListener("click", () => {
      materia.estudada = !materia.estudada;
      salvar();
      renderizar(searchInput.value);
      atualizarProgresso();
    });

    // Texto
    const span = document.createElement("span");
    span.className = "texto";
    span.textContent = materia.nome;

    // Ações
    const actions = document.createElement("div");
    actions.className = "actions";

    const up = document.createElement("button");
    up.innerHTML = "↑";
    up.addEventListener("click", () => moverItem(idxGlobal, -1));

    const down = document.createElement("button");
    down.innerHTML = "↓";
    down.addEventListener("click", () => moverItem(idxGlobal, 1));

    const del = document.createElement("button");
    del.innerHTML = "🗑";
    del.style.background = "#ff7675";
    del.addEventListener("click", () => {
      materias.splice(idxGlobal, 1);
      salvar();
      renderizar(searchInput.value);
      atualizarProgresso();
    });

    actions.append(up, down, del);

    li.append(check, span, actions);
    lista.appendChild(li);
  });

  atualizarProgresso();
}

// ==================== ATUALIZAR PROGRESSO ====================
function atualizarProgresso() {
  const total = materias.length;
  const estudadas = materias.filter(m => m.estudada).length;

  totalEl.textContent = total;
  estudadasEl.textContent = estudadas;

  const percent = total === 0 ? 0 : (estudadas / total) * 100;
  progressBar.style.width = percent + "%";

  // Motivação
  if (total > 0 && estudadas === total) {
    motivacao.classList.add("show");
    lancarConfetti();
  } else {
    motivacao.classList.remove("show");
  }
}

// ==================== ADICIONAR ====================
function adicionarMateria() {
  const valor = input.value.trim();
  if (!valor) return;

  materias.push({ nome: valor, estudada: false });
  salvar();
  renderizar(searchInput.value);
  input.value = "";
  input.focus();
}

// ==================== MOVER ITEM ====================
function moverItem(index, direcao) {
  const novoIndex = index + direcao;
  if (novoIndex < 0 || novoIndex >= materias.length) return;

  [materias[index], materias[novoIndex]] = [materias[novoIndex], materias[index]];
  salvar();
  renderizar(searchInput.value);
}

// ==================== MATÉRIA ALEATÓRIA ====================
function materiaAleatoria() {
  if (materias.length === 0) return alert("Adicione matérias primeiro! 📚");
  
  const randomIndex = Math.floor(Math.random() * materias.length);
  const item = lista.children[randomIndex];
  
  if (item) {
    item.style.transition = "all 0.6s";
    item.style.transform = "scale(1.08)";
    item.style.background = "#ffeaa7";
    
    setTimeout(() => {
      item.style.transform = "scale(1)";
      item.style.background = "";
    }, 1200);
    
    alert(`🎲 Matéria do dia: ${materias[randomIndex].nome}\n\nVá estudar agora, guerreiro!`);
  }
}

// ==================== LIMPAR TUDO ====================
function limparTudo() {
  if (confirm("Tem certeza que quer zerar a mochila inteira?")) {
    materias = [];
    salvar();
    renderizar();
  }
}

// ==================== CONFETTI (puro JS) ====================
function lancarConfetti() {
  const canvas = document.createElement("canvas");
  canvas.style.position = "fixed";
  canvas.style.top = "0";
  canvas.style.left = "0";
  canvas.style.width = "100%";
  canvas.style.height = "100%";
  canvas.style.pointerEvents = "none";
  canvas.style.zIndex = "9999";
  document.body.appendChild(canvas);

  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  const colors = ["#ff7675", "#00b894", "#f39c12", "#4a69bd", "#a29bfe"];

  class Particle {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height - canvas.height;
      this.size = Math.random() * 10 + 6;
      this.speed = Math.random() * 6 + 4;
      this.angle = Math.random() * Math.PI * 2;
      this.color = colors[Math.floor(Math.random() * colors.length)];
      this.rotation = Math.random() * 0.05;
    }
    update() {
      this.y += this.speed;
      this.angle += this.rotation;
      this.speed *= 0.99;
    }
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
      ctx.restore();
    }
  }

  for (let i = 0; i < 180; i++) particles.push(new Particle());

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
      p.update();
      p.draw();
      if (p.y > canvas.height) particles.splice(i, 1);
    });
    frame++;
    if (frame < 120 && particles.length > 0) requestAnimationFrame(animate);
    else document.body.removeChild(canvas);
  }
  animate();
}

// ==================== EVENTOS ====================
addBtn.addEventListener("click", adicionarMateria);
input.addEventListener("keypress", e => { if (e.key === "Enter") adicionarMateria(); });

searchInput.addEventListener("input", () => renderizar(searchInput.value));

randomBtn.addEventListener("click", materiaAleatoria);
clearBtn.addEventListener("click", limparTudo);

// Dark Mode
darkToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  const icon = darkToggle.querySelector("i");
  icon.classList.toggle("fa-moon");
  icon.classList.toggle("fa-sun");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
});

// Carregar tema salvo
if (localStorage.getItem("darkMode") === "true") {
  document.body.classList.add("dark");
  darkToggle.querySelector("i").classList.replace("fa-moon", "fa-sun");
}

// ==================== INICIALIZAÇÃO ====================
renderizar();
</script>

</body>
</html>
